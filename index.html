<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio de Evidencias</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}

body{
    background:url("bg.gif") center center / cover no-repeat fixed;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.contenedor{
    width:90%;
    max-width:1000px;
    background:rgba(17,17,17,0.88);
    backdrop-filter:blur(4px);
    padding:50px;
    border-radius:12px;
    border:1px solid #333;
    box-shadow:0 4px 12px rgba(255,255,255,0.05);
}

h1{
    text-align:center;
    color:#fff;
    font-size:2.3rem;
    margin-bottom:15px;
    font-weight:700;
}

h2{
    text-align:center;
    color:#d9d9d9;
    margin-bottom:20px;
    font-weight:500;
}

p{
    text-align:center;
    color:#bfbfbf;
    margin-bottom:35px;
    line-height:1.7;
}

ol{
    list-style:none;
}

li{
    margin-bottom:12px;
}

a{
    display:block;
    text-decoration:none;
    color:#fff;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:8px;
    padding:16px 20px;
    font-weight:500;
    transition:all .25s ease;
}

a:hover{
    background:#262626;
    border-color:#555;
    transform:translateX(5px);
}

.proyecto{
    background:#fff;
    color:#000;
    border:1px solid #fff;
}

.proyecto:hover{
    background:#e6e6e6;
    color:#000;
}

@media(max-width:768px){

    .contenedor{
        padding:30px;
    }

    h1{
        font-size:1.8rem;
    }

}
</style>

</head>
