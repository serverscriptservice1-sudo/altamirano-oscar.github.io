<!DOCTYPE html> 
<html> 
<head> 
    <title>Tabla modificada</title> 
</head> 
<body> 
 
<table border="1"> 
    <tr> 
        <th colspan="3">Horario Escolar</th> 
    </tr> 
    <tr> 
        <th>Día</th> 
        <th>Materia</th> 
        <th>Horario</th> 
    </tr> 
 
    <!-- Miércoles con rowspan --> 
    <tr> 
        <td rowspan="2">Miércoles</td> 
        <td>Matemáticas</td> 
        <td>8:00 - 10:00</td> 
    </tr> 
    <tr> 
        <td>Física</td> 
        <td>10:00 - 12:00</td> 
    </tr> 
 
    <!-- Jueves --> 
    <tr> 
        <td>Jueves</td> 
        <td>Química</td> 
        <td>8:00 - 10:00</td> 
    </tr> 
 
    <!-- Viernes con colspan de 3 columnas --> 
    <tr> 
        <td colspan="3">Viernes: Actividad Deportiva</td> 
    </tr> 
 
    <!-- Nueva fila con rowspan diferente --> 
    <tr> 
        <td rowspan="2">Sábado</td> 
        <td>Inglés</td> 
        <td>9:00 - 11:00</td> 
    </tr> 
    <tr> 
        <td>Arte</td> 
<td>11:00 - 1:00</td> 
</tr> 
</table> 
</body> 
</html>
