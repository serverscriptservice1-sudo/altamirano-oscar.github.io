<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donkey Kong Country 2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Verdana, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
    overflow-x:hidden;

    background:url("1139619.png") center center/cover no-repeat fixed;
}

/* Capa oscura sobre el fondo */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:0;
}

#principal{
    width:900px;
    max-width:100%;
    text-align:center;
    position:relative;
    z-index:1;
}

h1{
    color:#fff;
    font-size:32px;
    margin-bottom:15px;
    text-shadow:2px 2px 4px #000;
}

#contenedor{
    background:#111;
    border:2px solid #444;
    padding:12px;
    border-radius:8px;
    box-shadow:0 0 20px rgba(0,0,0,.6);
}

#game{
    width:100%;
    height:500px;
}

.logo{
    margin-top:15px;
    color:#ddd;
    font-size:12px;
    line-height:1.6;
}

.credito{
    margin-top:15px;
    color:#ccc;
    font-size:12px;
}

@media(max-width:768px){

    h1{
        font-size:24px;
    }

    #game{
        height:320px;
    }
}
</style>
</head>
<body>

<div id="principal">

    <h1>Donkey Kong Country 2</h1>

    <div id="contenedor">
        <div id="game"></div>
    </div>

    <div class="logo">
        Snes9x Online Test para proyecto de implementación<br>
        Diseñado por Altamirano Abaroa Oscar Emiliano y Moreno Moreno Lorenzo Santiago
    </div>

    <div class="credito">
        Hecho con el emulador OpenSource EmulatorJS
    </div>

</div>

<script>
EJS_player = "#game";
EJS_core = "snes9x";
EJS_gameUrl = "MX3.sfc";
EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
