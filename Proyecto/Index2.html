<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Megaman X3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    background:url('artwork.png') center center/cover no-repeat fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        linear-gradient(
            180deg,
            rgba(0,0,0,.30),
            rgba(0,0,0,.55)
        );
    z-index:-1;
}

#principal{
    width:1100px;
    max-width:95%;
    background:rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:35px;
    backdrop-filter:blur(6px);
    box-shadow:
        0 20px 50px rgba(0,0,0,.4);
}

.barra-superior{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    color:#8f8f8f;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
}

h1{
    color:#fff;
    text-align:center;
    font-size:48px;
    font-weight:800;
    letter-spacing:.5px;
    margin-bottom:8px;
}

.subtitulo{
    text-align:center;
    color:#9ca3af;
    font-size:14px;
    margin-bottom:30px;
    letter-spacing:1px;
    text-transform:uppercase;
}

#contenedor{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:18px;
    backdrop-filter:blur(4px);
}

#game{
    width:100%;
    height:600px;
    border-radius:10px;
    overflow:hidden;
    background:#000;
}

.info-juego{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:18px;
    flex-wrap:wrap;
    color:rgba(255,255,255,.75);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.credito{
    margin-top:25px;
    text-align:center;
    color:#8b8b8b;
    font-size:12px;
}

.btn-regresar{
    position:fixed;
    left:20px;
    bottom:20px;
    background:rgba(20,20,20,.75);
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    transition:.25s;
    font-weight:600;
    z-index:9999;
    backdrop-filter:blur(6px);
}

.btn-regresar:hover{
    transform:translateY(-2px);
    background:rgba(31,41,55,.85);
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    #principal{
        padding:18px;
    }

    .barra-superior{
        flex-direction:column;
        gap:5px;
        text-align:center;
    }

    h1{
        font-size:32px;
    }

    .subtitulo{
        font-size:12px;
    }

    #game{
        height:320px;
    }

    .info-juego{
        gap:12px;
        font-size:11px;
    }

    .btn-regresar{
        left:10px;
        bottom:10px;
        padding:10px 18px;
        font-size:12px;
    }
}
</style>
</head>
<body>

<div id="principal">

    <div class="barra-superior">
        <span>SNES Emulator</span>
        <span>Megaman X3</span>
    </div>

    <h1>Megaman X3</h1>

    <div class="subtitulo">
        Super Nintendo • Capcom • 1995
    </div>

    <div id="contenedor">
        <div id="game"></div>
    </div>

    <div class="info-juego">
        <span>Acción / Plataformas</span>
        <span>1 Jugador</span>
        <span>Mega Man X Series</span>
    </div>

    <div class="credito">
        Hecho con el emulador OpenSource EmulatorJS
    </div>

</div>

<a href="../index.html" class="btn-regresar">
    ← Regresar
</a>

<script>
EJS_player = '#game';
EJS_core = 'snes';
EJS_gameUrl = 'Megaman X3.smc';
EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/';
</script>

<script src="https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js"></script>

</body>
</html>
