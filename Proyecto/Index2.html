<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Donkey Kong Country 2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Verdana, sans-serif;
    min-height:100vh;
    padding:30px;

    background:url('1139619.png') center center/cover no-repeat fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:-1;
}

#principal{
    width:900px;
    max-width:100%;
    margin:auto;
    text-align:center;
}

h1{
    color:#fff;
    font-size:32px;
    margin-bottom:15px;
    text-shadow:2px 2px 4px #000;
}

#contenedor{
    background:#111;
    border:2px solid #444;
    padding:12px;
    border-radius:8px;
}

#game{
    width:100%;
    height:500px;
}

.logo{
    margin-top:12px;
    color:#ddd;
    font-size:12px;
    text-align:center;
    line-height:1.5;
}

.credito{
    position:fixed;
    bottom:10px;
    left:15px;
    color:#ddd;
    font-size:12px;
    text-shadow:1px 1px 2px #000;
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    h1{
        font-size:24px;
    }

    #game{
        height:320px;
    }
}
</style>
</head>
<body>

<div id="principal">



    <div id="contenedor">
        <div id="game"></div>
    </div>

    <div class="logo">
        Snes9x Online Test para proyecto de implementa<br>
        Diseñado por Altamirano Abaroa Oscar Emiliano y Moreno Moreno Lorenzo Santiago
    </div>

</div>

<div class="credito">
    Hecho con el emulador OpenSource EmulatorJS
</div>

<script>
EJS_player = '#game';
EJS_core = 'snes9x';
EJS_gameUrl = 'MK3.sfc';
EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/';
</script>

<script src="https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js"></script>

</body>
</html>
