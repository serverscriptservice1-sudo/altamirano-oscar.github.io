<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Megaman X3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    overflow:hidden;
    background:#000;
}

.bg-slide{
    position:fixed;
    inset:0;
    background-position:center;
    background-size:cover;
    background-repeat:no-repeat;
    opacity:0;
    transition:opacity 1.5s ease-in-out;
    z-index:-3;
}

#bg1{
    opacity:1;
}

#fade-overlay{
    position:fixed;
    inset:0;
    background:#000;
    opacity:0;
    pointer-events:none;
    z-index:-1;
    transition:opacity 1.5s ease;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(
        180deg,
        rgba(0,0,0,.30),
        rgba(0,0,0,.55)
    );
    z-index:-2;
}

#principal{
    width:1100px;
    max-width:95%;
    background:rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:35px;
    backdrop-filter:blur(6px);
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.logo-juego{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:8px;
}

.logo-juego img{
    max-width:420px;
    width:100%;
    height:auto;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));
}

.subtitulo{
    text-align:center;
    color:#9ca3af;
    font-size:14px;
    margin-bottom:30px;
    letter-spacing:1px;
    text-transform:uppercase;
}

#contenedor{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:18px;
    backdrop-filter:blur(4px);
}

#game{
    width:100%;
    height:600px;
    border-radius:10px;
    overflow:hidden;
    background:#000;
}

.credito{
    margin-top:25px;
    text-align:center;
    color:#8b8b8b;
    font-size:12px;
}

.btn-regresar{
    position:fixed;
    left:20px;
    bottom:20px;
    background:rgba(20,20,20,.75);
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    transition:.25s;
    font-weight:600;
    z-index:9999;
    backdrop-filter:blur(6px);
}

.btn-regresar:hover{
    transform:translateY(-2px);
    background:rgba(31,41,55,.85);
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    #principal{
        padding:18px;
    }

    .logo-juego img{
        max-width:280px;
    }

    .subtitulo{
        font-size:12px;
    }

    #game{
        height:320px;
    }

    .btn-regresar{
        left:10px;
        bottom:10px;
        padding:10px 18px;
        font-size:12px;
    }
}
</style>
</head>
<body>

<div id="bg1" class="bg-slide"></div>
<div id="bg2" class="bg-slide"></div>
<div id="fade-overlay"></div>

<div id="principal">

    <div class="logo-juego">
        <img src="Mega_Man_X3_Logo.png" alt="Mega Man X3">
    </div>

    <div class="subtitulo">
        Super Nintendo • Capcom • 1995
    </div>

    <div id="contenedor">
        <div id="game"></div>
    </div>

    <div class="credito">
        Hecho con el emulador OpenSource EmulatorJS
    </div>

</div>

<a href="../index.html" class="btn-regresar">
    ← Regresar
</a>

<script>
EJS_player = '#game';
EJS_core = 'snes';
EJS_gameUrl = 'Megaman X3.smc';
EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/';
</script>

<script src="https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js"></script>

<script>
const fondos = [
    'artwork.png',
    '1.gif',
    '2.gif',
    '3.gif',
    'artwork2.jpg'
];

let actual = 0;

const bg1 = document.getElementById('bg1');
const bg2 = document.getElementById('bg2');
const fade = document.getElementById('fade-overlay');

bg1.style.backgroundImage = `url('${fondos[0]}')`;

let visible = bg1;
let oculto = bg2;

function cambiarFondo(){

    fade.style.opacity = '1';

    setTimeout(() => {

        actual = (actual + 1) % fondos.length;

        oculto.style.backgroundImage =
            `url('${fondos[actual]}')`;

        visible.style.opacity = '0';
        oculto.style.opacity = '1';

        [visible, oculto] = [oculto, visible];

        fade.style.opacity = '0';

    }, 1500);
}

setInterval(cambiarFondo, 6000);
</script>

</body>
</html>
