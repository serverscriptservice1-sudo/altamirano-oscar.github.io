<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Megaman X3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    background:url('1139619.png') center center/cover no-repeat fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.70);
    z-index:-1;
}

#principal{
    width:1000px;
    max-width:95%;
    background:rgba(0,0,0,.88);
    border:1px solid #2f2f2f;
    border-radius:10px;
    padding:30px;
    backdrop-filter:blur(4px);
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

h1{
    color:#fff;
    text-align:center;
    font-size:42px;
    margin-bottom:10px;
    font-weight:700;
}

.subtitulo{
    text-align:center;
    color:#cfcfcf;
    font-size:14px;
    margin-bottom:25px;
    line-height:1.8;
}

#contenedor{
    background:#0f0f0f;
    border:1px solid #303030;
    border-radius:8px;
    padding:15px;
}

#game{
    width:100%;
    height:600px;
    border-radius:6px;
    overflow:hidden;
}

.credito{
    margin-top:20px;
    position:relative;
    min-height:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#bdbdbd;
    font-size:13px;
    text-align:center;
}

.btn-regresar{
    position:absolute;
    left:0;
    bottom:0;
    background:#1b1b1b;
    color:#fff;
    text-decoration:none;
    padding:12px 24px;
    border:1px solid #3a3a3a;
    border-radius:5px;
    transition:.3s;
    font-weight:600;
}

.btn-regresar:hover{
    background:#252525;
    border-color:#666;
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    #principal{
        padding:15px;
    }

    h1{
        font-size:28px;
    }

    .subtitulo{
        font-size:12px;
    }

    #game{
        height:320px;
    }

    .credito{
        flex-direction:column;
        text-align:center;
        min-height:auto;
        gap:15px;
    }

    .btn-regresar{
        position:static;
    }
}
</style>
</head>
<body>

<div id="principal">

    <h1>Megaman X3</h1>

    <div class="subtitulo">
        test
    </div>

    <div id="contenedor">
        <div id="game"></div>
    </div>

    <div class="credito">

        <a href="../index.html" class="btn-regresar">
            Regresar al Portafolio
        </a>

        <span>Hecho con el emulador OpenSource EmulatorJS</span>

    </div>

</div>

<script>
EJS_player = '#game';
EJS_core = 'snes';
EJS_gameUrl = 'Megaman X3.smc';
EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/';
</script>

<script src="https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js"></script>

</body>
</html>
